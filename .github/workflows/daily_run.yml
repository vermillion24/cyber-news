name: Daily Cyber Intelligence Sync

on:
  schedule:
    - cron: '0 5 * * *' # 5:00 AM Daily
  workflow_dispatch: # run manually to test

jobs:
  sync_intelligence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser resend google-genai tweepy python-dotenv

      - name: Run Cyber Intelligence Engine
        env:
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
        
        run: python main.py
